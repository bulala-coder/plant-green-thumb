<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3f7d58" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="植物綠手指" />
  <meta name="description" content="植物收藏管理、環境參數追蹤與進階照護決策 Web App。" />
  <link rel="manifest" href="./plant-green-thumb-manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./plant-green-thumb-icon-192.png" />
  <link rel="apple-touch-icon" href="./plant-green-thumb-icon-192.png" />
  <title>植物綠手指</title>
  <style>
    :root {
      --bg: #f6f3ea;
      --card: #ffffff;
      --green: #3f7d58;
      --green-dark: #2f6244;
      --green-soft: #e4f0e7;
      --text: #223026;
      --muted: #6f7d72;
      --warning: #bd6b2f;
      --danger: #a53f3f;
      --line: #e4dfd3;
      --shadow: 0 10px 25px rgba(40, 60, 45, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 104px;
      background: linear-gradient(180deg, #f9f6ed 0%, #f1eee5 100%);
    }

    header {
      padding: 8px 2px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      font-size: 24px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; letter-spacing: 0.5px; }
    h2 { font-size: 22px; margin-bottom: 8px; }
    h3 { font-size: 17px; margin-bottom: 8px; }
    p { line-height: 1.65; }

    .subtitle { color: var(--muted); font-size: 14px; margin-top: 2px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fade 0.18s ease; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(228, 223, 211, 0.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 12px 0;
    }

    .soft-card {
      background: var(--green-soft);
      border: 1px solid #d3e6d7;
      border-radius: var(--radius);
      padding: 15px;
      margin: 12px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      background: #fff;
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #e7e1d6;
    }

    .stat strong { display: block; font-size: 20px; color: var(--green-dark); }
    .stat span { font-size: 12px; color: var(--muted); }

    button, .button-like {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      background: var(--green);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    button.secondary { background: #eef3ec; color: var(--green-dark); }
    button.light { background: #fff; color: var(--green-dark); border: 1px solid #dce6dc; }
    button.danger { background: #fff0ed; color: var(--danger); border: 1px solid #efc8c1; }
    button.full { width: 100%; margin-top: 10px; }
    button.small { padding: 8px 12px; font-size: 13px; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #ded8cd;
      border-radius: 15px;
      padding: 12px 13px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea { min-height: 84px; resize: vertical; }

    .finder-tools {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }

    .category-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 6px;
      scrollbar-width: none;
    }

    .category-row::-webkit-scrollbar { display: none; }

    .plant-picker {
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .plant-option {
      width: 100%;
      text-align: left;
      border-radius: 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
    }

    .plant-option:last-child { border-bottom: 0; }

    .plant-option.active {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .plant-option small {
      display: block;
      color: var(--muted);
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.4;
    }

    .selected-plant {
      background: #f7fbf4;
      border: 1px solid #d6e8d9;
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
    }


    .ease-guide {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .ease-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
      background: #fffdf8;
    }

    .ease-card strong {
      display: block;
      color: var(--green-dark);
      margin-bottom: 4px;
    }

    .ease-card .hint {
      margin-bottom: 8px;
    }

    .recommend-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .recommend-chip {
      background: #eef6e8;
      color: var(--green-dark);
      border: 1px solid #d7e8cf;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .ease-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 4px 8px;
      background: #f2f7ee;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 800;
      margin-top: 6px;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
      margin: 4px 0 8px;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #ddd6ca;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .pill.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .plant-title { font-size: 18px; font-weight: 800; }
    .meta { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .warning { color: var(--warning); font-weight: 700; }
    .danger-text { color: var(--danger); font-weight: 700; }

    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--muted);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 100%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      z-index: 10;
    }

    .nav button {
      background: transparent;
      color: var(--muted);
      padding: 8px 2px;
      border-radius: 14px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav button.active {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .nav .icon { font-size: 18px; }

    .knowledge-item, .symptom-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .knowledge-item:last-child, .symptom-item:last-child { border-bottom: 0; }

    .list-log {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .list-log:last-child { border-bottom: 0; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 88px;
      transform: translateX(-50%);
      width: min(420px, calc(100% - 32px));
      background: #203427;
      color: #fff;
      border-radius: 18px;
      padding: 13px 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      display: none;
      z-index: 20;
      font-size: 14px;
    }

    .toast.show { display: block; animation: fade 0.15s ease; }


    .game-card {
      background: linear-gradient(135deg, #e9f5df 0%, #ffffff 100%);
      border: 1px solid rgba(63, 125, 88, 0.18);
    }

    .level-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .level-pill, .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .xp-bar {
      height: 10px;
      background: #dfe7d8;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 8px;
    }

    .xp-fill {
      height: 100%;
      width: var(--xp, 0%);
      background: var(--green);
      border-radius: 999px;
    }

    .badge-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge-pill.locked {
      background: #f1eee5;
      color: var(--muted);
      font-weight: 600;
    }


    .academy-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .skill-card {
      background: #fff;
      border: 1px solid #e7e1d6;
      border-radius: 18px;
      padding: 13px;
    }

    .skill-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .mini-bar {
      height: 8px;
      background: #e9e4d9;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .mini-fill {
      height: 100%;
      width: var(--value, 0%);
      background: var(--green);
      border-radius: 999px;
    }

    .quiz-option {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      margin-top: 8px;
      background: #fff;
      color: var(--text);
      border: 1px solid #ded8cd;
    }

    .quiz-option.correct {
      background: var(--green-soft);
      color: var(--green-dark);
      border-color: #b7d8bf;
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 800;
      margin-bottom: 8px;
    }



    .hero-card {
      background: radial-gradient(circle at top left, #f3f8e8 0%, #ffffff 52%, #f9f6ed 100%);
      border: 1px solid rgba(63, 125, 88, 0.16);
    }

    .top-quest {
      border-left: 5px solid var(--green);
    }

    .quest-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .quest-item:last-child { border-bottom: 0; }
    .quest-check { font-size: 18px; line-height: 1.35; }
    .quest-item.done strong { text-decoration: line-through; color: var(--muted); }

    .install-steps {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .onboarding-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31, 49, 36, 0.36);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }

    .onboarding-overlay.show { display: flex; }

    .onboarding-panel {
      width: min(480px, 100%);
      background: #fff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.24);
      border: 1px solid rgba(228, 223, 211, 0.9);
    }

    .onboarding-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .onboarding-step:last-child { border-bottom: 0; }
    .step-icon { font-size: 24px; width: 30px; text-align: center; }

    @media (max-width: 390px) {
      .nav button { font-size: 11px; }
      .nav .icon { font-size: 16px; }
      h1 { font-size: 22px; }
      h2 { font-size: 20px; }
    }

    .divider { height: 1px; background: var(--line); margin: 14px 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="logo">🌱</div>
        <div>
          <h1>植物綠手指</h1>
          <p class="subtitle">植物玩家的收藏管理與照護決策系統</p>
        </div>
      </div>
    </header>

    <section id="screen-today" class="screen active"></section>
    <section id="screen-plants" class="screen"></section>
    <section id="screen-add" class="screen"></section>
    <section id="screen-detail" class="screen"></section>
    <section id="screen-log" class="screen"></section>
    <section id="screen-diagnosis" class="screen"></section>
    <section id="screen-diagnosis-result" class="screen"></section>
    <section id="screen-knowledge" class="screen"></section>
    <section id="screen-knowledge-detail" class="screen"></section>
    <section id="screen-academy" class="screen"></section>
    <section id="screen-analysis" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </main>

  <nav class="nav">
    <button data-nav="today" class="active"><span class="icon">☀️</span>總覽</button>
    <button data-nav="plants"><span class="icon">🪴</span>收藏</button>
    <button data-nav="diagnosis"><span class="icon">🩺</span>診斷</button>
    <button data-nav="knowledge"><span class="icon">📚</span>知識</button>
    <button data-nav="analysis"><span class="icon">📊</span>分析</button>
    <button data-nav="settings"><span class="icon">⚙️</span>設定</button>
  </nav>

  <div id="toast" class="toast"></div>
  <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
  <div id="onboarding" class="onboarding-overlay"></div>

  <script>
    const STORAGE_KEY = 'plantGreenThumb.v1';

    function getEaseLevelByName(name, legacyLevel = '中') {
      const groups = {
        '第一盆首選': ['黃金葛', '虎尾蘭', '金錢樹', '吊蘭', '心葉蔓綠絨', '合果芋', '粗肋草', '圓葉椒草', '豆瓣綠', '酒瓶蘭'],
        '很好養': ['蘆薈', '仙人掌', '蔥', '萬年青', '白網紋草', '椒草類', '仙人球', '開運竹', '富貴竹'],
        '好養': ['龜背芋', '發財樹', '白鶴芋', '橡皮樹', '羅勒', '薄荷', '小精靈空氣鳳梨', '蔓綠絨', '黑金剛橡皮樹', '冷水花', '長壽花', '日日春', '袖珍椰子', '鏡面草'],
        '普通': ['多肉植物', '鹿角蕨', '波士頓腎蕨', '非洲菫', '蝴蝶蘭', '九層塔', '香菜', '龜背竹', '姑婆芋', '鳥巢蕨', '常春藤', '觀音蓮', '玉露', '熊童子', '石蓮花', '文心蘭', '茉莉花', '矮牽牛', '天竺葵', '聖誕紅', '天堂鳥', '散尾葵', '馬拉巴栗', '空氣鳳梨', '松蘿空氣鳳梨', '電捲燙空氣鳳梨', '老人鬚'],
        '稍難': ['琴葉榕', '鐵線蕨', '竹芋類', '竹芋', '孔雀竹芋', '青蘋果竹芋', '迷迭香', '薰衣草', '海芋', '女王頭空氣鳳梨', '空氣鳳梨霸王', '粉紅公主蔓綠絨', '彩葉芋', '玫瑰', '梔子花', '繡球花'],
        '高難度': ['捕蠅草', '豬籠草', '腎蕨高濕品種', '特殊斑葉品種']
      };
      for (const [level, names] of Object.entries(groups)) {
        if (names.includes(name)) return level;
      }
      const legacyMap = { '低': '很好養', '低到中': '好養', '中': '普通', '中高': '稍難', '高': '高難度' };
      return legacyMap[legacyLevel] || '普通';
    }

    function buildPlantKnowledgeFields(plant) {
      const airPlantNames = ['空氣鳳梨', '小精靈空氣鳳梨', '松蘿空氣鳳梨', '女王頭空氣鳳梨', '電捲燙空氣鳳梨', '老人鬚', '空氣鳳梨霸王'];
      const isAir = airPlantNames.includes(plant.name);
      const ease = getEaseLevelByName(plant.name, plant.legacyDifficulty);
      const fallbackByCategory = {
        '室內觀葉': {
          personality: '穩定、耐看、適合室內陪伴',
          originStory: '這類植物多來自溫暖、濕潤或林下環境，因此通常喜歡明亮散射光，不適合長時間強烈直曬。',
          funFact: '很多室內觀葉植物在原生環境中會攀附樹木或在林下生長，室內盆栽只是它們較小型的一面。',
          beginnerTip: '先學會觀察土壤乾濕與葉片狀態，不要固定照日期澆水。',
          expertNote: '觀察新葉大小、節間距離與葉色變化，可以判斷光照是否足夠。'
        },
        '多肉仙人掌': {
          personality: '獨立、耐旱、怕被過度照顧',
          originStory: '這類植物多適應乾燥或排水快速的環境，因此能儲存水分，但不耐長期潮濕。',
          funFact: '多肉植物肥厚的葉片或莖，其實就是它們儲水的方式。',
          beginnerTip: '寧可少澆，也不要讓介質長期潮濕。',
          expertNote: '觀察徒長、葉片變薄或失去緊實感，可以判斷光照與水分是否失衡。'
        },
        '香草蔬菜': {
          personality: '生長快、反應明顯、需要穩定照顧',
          originStory: '許多香草植物需要較充足光照與通風，適合陽台或窗邊明亮處。',
          funFact: '香草植物的香氣常來自揮發性物質，這些氣味也可能幫助植物抵禦昆蟲或環境壓力。',
          beginnerTip: '香草植物通常比觀葉植物更需要光照，室內太暗容易長不好。',
          expertNote: '觀察節間是否拉長、葉色是否變淡，可以判斷光照是否不足。'
        },
        '蕨類竹芋': {
          personality: '細膩、喜濕、對環境變化敏感',

    function todayISO() {
      return new Date().toISOString().slice(0, 10);

    function formatDate(dateString) {
      if (!dateString) return '尚未記錄';
      const d = new Date(dateString + 'T00:00:00');
      return `${d.getMonth() + 1} 月 ${d.getDate()} 日`;

    function addDays(dateString, days) {
      const d = new Date(dateString + 'T00:00:00');
      d.setDate(d.getDate() + Number(days || 0));
      return d.toISOString().slice(0, 10);
    }

    function daysBetween(a, b) {
      const da = new Date(a + 'T00:00:00');
      const db = new Date(b + 'T00:00:00');
      return Math.floor((da - db) / 86400000);
    }

    function nextWaterDate(plant) {
      return addDays(plant.lastWateredAt || todayISO(), plant.waterIntervalDays || getPlantInfo(plant.name).interval);
    }

    function plantNeedsWater(plant) {
      return todayISO() >= nextWaterDate(plant);

    function maintenanceProfile(plant) {
      const info = getPlantInfo(plant.name || plant);
      const category = getPlantCategory(info);
      const ease = getEaseLevel(info);
      if (isAirPlant(info)) return '附生型';
      if (category === '特殊植物') return '特殊收藏';
      if (category === '開花植物') return '開花觀賞';
      if (category === '多肉仙人掌' || info.light.includes('強光')) return '強光耐旱';
      if (category === '蕨類竹芋' || ['稍難', '高難度'].includes(ease)) return '高濕敏感';
      if (['第一盆首選', '很好養', '好養'].includes(ease)) return '低維護';
      return '中等維護';
    }

      const cutoff = new Date(todayISO() + 'T00:00:00');

      return appData.careLogs.filter(log => {
        if (plantId && log.plantId !== plantId) return false;
        if (!log.date) return false;
        return new Date(log.date + 'T00:00:00') >= cutoff;
      });
    }

    function mostCommonCareType(logs) {

      const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
      return top ? `${top[0]}（${top[1]} 次）` : '尚無紀錄';
    }

    function averageWaterInterval(logs) {
      const dates = [...new Set(logs.filter(l => l.type === '澆水' && l.date).map(l => l.date))].sort();
      if (dates.length < 2) return '資料不足';
      const gaps = dates.slice(1).map((date, i) => daysBetween(date, dates[i]));
      const avg = gaps.reduce((sum, n) => sum + n, 0) / gaps.length;
      return `${avg.toFixed(1)} 天`;
    }

        avgWaterInterval: averageWaterInterval(logs),
        topType: mostCommonCareType(logs)
      };
    }

    function careXp(type) {
      const xpMap = { '觀察': 5, '澆水': 10, '施肥': 12, '修剪': 12, '換盆': 20, '除蟲': 18, '小測驗': 8, '知識卡': 4, '植物趣事': 4, '學習': 2 };
      return xpMap[type] || 5;
    }

    function samePlantTypeDateKey(log) {
      return `${log.plantId || 'global'}::${log.type}::${log.date}`;
    }

    function alreadyClaimedCareXP(plantId, type, date) {
      return appData.careLogs.some(log => log.plantId === plantId && log.type === type && log.date === date);
    }

    function calculateCareLogXP() {
      const awardedKeys = new Set();
      return appData.careLogs.reduce((sum, log) => {
        if (log.xpAwarded === false) return sum;
        if (log.plantId) {
          const key = samePlantTypeDateKey(log);
          if (awardedKeys.has(key)) return sum;
          awardedKeys.add(key);
        }
        return sum + careXp(log.type);
      }, 0);
    }

    function logHappenedWithin24Hours(log, now = new Date()) {
      const happenedAt = log.createdAt ? new Date(log.createdAt) : new Date(`${log.date}T00:00:00`);
      if (Number.isNaN(happenedAt.getTime())) return false;
      const hours = (now.getTime() - happenedAt.getTime()) / 3600000;
      return hours >= 0 && hours < 24;
    }

    function hasWateredWithin24Hours(plantId) {
      return appData.careLogs.some(log => log.plantId === plantId && log.type === '澆水' && logHappenedWithin24Hours(log));
    }

    function confirmRepeatWateringIfNeeded(plantId) {
      if (!hasWateredWithin24Hours(plantId)) return true;
      return confirm('這盆植物 24 小時內已經記錄過澆水。多數植物不需要短時間內重複澆水。請確認你不是重複操作。');
    }

    function recordCareLog({ plantId, type, date, note, forceNoXP = false }) {
      const sameDateXPAlreadyClaimed = Boolean(plantId) && alreadyClaimedCareXP(plantId, type, date);
      const xpAwarded = !forceNoXP && !sameDateXPAlreadyClaimed;
      const log = { id: uid('log'), plantId, type, date, note, xpAwarded, createdAt: new Date().toISOString() };
      appData.careLogs.push(log);
      return { log, xpAwarded, xp: xpAwarded ? careXp(type) : 0, sameDateXPAlreadyClaimed };
    }

    function gameStats() {
      const xp = calculateCareLogXP() + appData.plants.length * 15;
      const level = Math.floor(xp / 100) + 1;
      const currentXp = xp % 100;
      const nextXp = 100 - currentXp;
      const uniqueDates = [...new Set(appData.careLogs.map(l => l.date).filter(Boolean))].sort().reverse();
      let streak = 0;
      let cursor = new Date(todayISO() + 'T00:00:00');
      const dateSet = new Set(uniqueDates);
      if (!dateSet.has(todayISO())) cursor.setDate(cursor.getDate() - 1);
      while (dateSet.has(cursor.toISOString().slice(0, 10))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      const readCount = Object.values(academySettings().readCards || {}).filter(Boolean).length;
      const quizCount = appData.careLogs.filter(l => l.type === '小測驗').length;
      const badges = [
        { name: '收藏建檔', icon: '🌱', unlocked: appData.plants.length >= 1 },
        { name: '紀錄啟動', icon: '💧', unlocked: appData.careLogs.length >= 1 },
        { name: '不亂澆水的人', icon: '🖐️', unlocked: appData.careLogs.filter(l => l.type === '觀察').length >= 5 },

        { name: '植物小隊', icon: '🪴', unlocked: appData.plants.length >= 3 },

        { name: '紀錄達人', icon: '📓', unlocked: appData.careLogs.length >= 20 }
      ];
      const title = titleForLevel(level);
      return { xp, level, currentXp, nextXp, streak, badges, unlockedBadges: badges.filter(b => b.unlocked), title };
    }

    function skillProgress(skillKey) {
      const logs = appData.careLogs;
      const observations = logs.filter(l => l.type === '觀察').length;
      const waters = logs.filter(l => l.type === '澆水').length;
      const diagnostics = logs.filter(l => (l.note || '').includes('診斷') || l.type === '除蟲').length;
      const quizzes = logs.filter(l => l.type === '小測驗').length;
      const reads = Object.values(academySettings().readCards || {}).filter(Boolean).length;
      const plants = appData.plants.length;
      const map = {
        water: Math.min(100, observations * 10 + waters * 8),
        light: Math.min(100, observations * 8 + reads * 6),
        soil: Math.min(100, waters * 6 + plants * 8 + reads * 5),
        growth: Math.min(100, logs.filter(l => ['施肥','修剪','換盆'].includes(l.type)).length * 18 + reads * 5),
        diagnosis: Math.min(100, diagnostics * 18 + quizzes * 10),
        record: Math.min(100, logs.length * 5)
      };
      return map[skillKey] || 0;
    }

    function savePlantEnvironment(id) {
      const p = appData.plants.find(x => x.id === id);
      if (!p) return;
      p.ventilation = document.getElementById('edit-ventilation').value;
      p.humidity = document.getElementById('edit-humidity').value;
      p.potMaterial = document.getElementById('edit-pot-material').value;
      p.substrateType = document.getElementById('edit-substrate').value;
      p.growingSetup = document.getElementById('edit-growing-setup').value;
      p.updatedAt = new Date().toISOString();
      saveData();
      renderAll();
      renderDetail(id);
      showToast('環境參數已更新。');
    }

    function renderLog(id) {
      const p = appData.plants.find(x => x.id === id);
      if (!p) return;
      document.getElementById('screen-log').innerHTML = `
        <button class="light small" onclick="openDetail('${id}')">← 返回</button>
        <h2>新增照護紀錄</h2>
        <p class="subtitle">${escapeHTML(p.name)}「${escapeHTML(p.nickname || '未命名')}」</p>
        <div class="card">
          <label>照護類型</label>
          <select id="log-type"><option>澆水</option><option>施肥</option><option>修剪</option><option>換盆</option><option>除蟲</option><option>觀察</option></select>
          <label>日期</label>
          <input id="log-date" type="date" value="${todayISO()}" />
          <label>備註</label>
          <textarea id="log-note" placeholder="例如：土壤變乾，澆到盆底出水"></textarea>
          <p class="hint">記錄澆水前，請先摸土，確認土壤 2 公分以下偏乾再澆。</p>
          <button class="full" onclick="saveLog('${id}')">儲存紀錄</button>
        </div>`;
    }

    function saveLog(id) {
      const type = document.getElementById('log-type').value;
      const date = document.getElementById('log-date').value || todayISO();
      const note = document.getElementById('log-note').value.trim();
      const repeatWatering = type === '澆水' && hasWateredWithin24Hours(id);
      if (repeatWatering && !confirmRepeatWateringIfNeeded(id)) return;
      const result = recordCareLog({ plantId: id, type, date, note, forceNoXP: repeatWatering });
      if (type === '澆水') {
        const p = appData.plants.find(x => x.id === id);
        if (p) { p.lastWateredAt = date; p.updatedAt = new Date().toISOString(); }
      }
      saveData();
      renderAll();
      openDetail(id);
      toastCareLogResult(result);
    }

    function quickObserve(id) {
      const p = appData.plants.find(x => x.id === id);
      const result = recordCareLog({ plantId: id, type: '觀察', date: todayISO(), note: '今日任務：完成植物觀察。' });
      if (p) p.updatedAt = new Date().toISOString();
      saveData();
      renderAll();
      if (selectedPlantId === id) renderDetail(id);
      toastCareLogResult(result);
    }

    function quickWater(id) {
      const repeatWatering = hasWateredWithin24Hours(id);
      if (repeatWatering && !confirmRepeatWateringIfNeeded(id)) return;
      const result = recordCareLog({ plantId: id, type: '澆水', date: todayISO(), note: '快速記錄澆水。', forceNoXP: repeatWatering });
      const p = appData.plants.find(x => x.id === id);
      if (p) { p.lastWateredAt = todayISO(); p.updatedAt = new Date().toISOString(); }
      saveData();
      renderAll();
      if (selectedPlantId === id) renderDetail(id);
      toastCareLogResult(result);
    }

    function deletePlant(id) {
      if (!confirm('確定要刪除此植物嗎？相關照護紀錄也會刪除。')) return;
      appData.plants = appData.plants.filter(p => p.id !== id);
      appData.careLogs = appData.careLogs.filter(l => l.plantId !== id);
      saveData();
      selectedPlantId = null;
      renderAll();
      showToast('植物已刪除。');
      setScreen('plants');
    }

    function openDiagnosisResult(symptom) {
      selectedSymptom = symptom;
      renderDiagnosisResult(symptom);
      setScreen('diagnosis-result');
    }

    function renderDiagnosisResult(symptom) {
      const s = symptomDatabase[symptom];
      if (!s) return;
      document.getElementById('screen-diagnosis-result').innerHTML = `
        <button class="light small" onclick="setScreen('diagnosis')">← 返回診斷</button>
        <div class="card">
          <h2>鑑別診斷：${escapeHTML(symptom)}</h2>
          <h3>鑑別診斷</h3>
          <p>${s.causes.map((c, i) => `${i + 1}. ${escapeHTML(c)}`).join('<br>')}</p>
          <div class="divider"></div>
          <h3>追問清單</h3>
          <p>1. 最近 7 天是否澆水或換位置？<br>2. 介質是否長期潮濕或完全乾透？<br>3. 光照、通風、濕度是否近期改變？<br>4. 葉背、莖節與盆土表面是否有蟲害或霉味？</p>
          <div class="divider"></div>
          <h3>優先排除項目</h3>
          <p>水分失衡 → 根系缺氧 → 光照不符 → 通風不足 → 病蟲害。</p>
          <div class="divider"></div>
          <h3>今日處置</h3>
          <p>${s.today.map((c, i) => `${i + 1}. ${escapeHTML(c)}`).join('<br>')}</p>
          <div class="divider"></div>
          <h3>7 天觀察指標</h3>
          <p>${escapeHTML(s.plan)}</p>
          <div class="divider"></div>
          <h3>風險等級與警訊</h3>
          <p>${escapeHTML(s.severity)}</p>
          <p class="warning">${escapeHTML(s.warning)}</p>
        </div>`;
    }

    function renderBuyingGuide() {
      return `<div class="card">
        <h3>尚未建立收藏？可從低維護品種開始</h3>
        <p class="hint">若要建立穩定的收藏基準，可先選擇黃金葛、虎尾蘭、金錢樹、吊蘭等容錯率高的品種。</p>
      </div>`;
    }

    function renderKnowledge() {
      document.getElementById('screen-knowledge').innerHTML = `
        <h2>植物知識庫</h2>
        <p class="subtitle">搜尋植物資料，了解照護、原生地故事與植物趣事。</p>
        ${appData.plants.length === 0 ? renderBuyingGuide() : ''}
        <div class="card">
          <h3>搜尋植物</h3>
          <input id="knowledge-search" placeholder="搜尋植物，例如：蘭、蕨、多肉、香草" value="${escapeHTML(knowledgeSearch)}" oninput="setKnowledgeSearch(this.value)" />
          <label style="margin-bottom:0;">管理難度 / 養護型態</label>
          <div class="category-row" style="margin-top:10px;">
            ${maintenanceCategories.map(c => `<button type="button" class="small ${selectedKnowledgeCategory === c ? '' : 'light'}" onclick="setKnowledgeCategory('${c}')">${c}</button>`).join('')}
          </div>
          <p id="knowledge-result-count" class="result-count"></p>
          <div id="knowledge-list"></div>
        </div>`;
      renderKnowledgeList();
    }

    function setKnowledgeCategory(category) {
      selectedKnowledgeCategory = category;
      renderKnowledge();
    }

    function setKnowledgeSearch(value) {
      knowledgeSearch = value;
      renderKnowledgeList();
    }

    function renderKnowledgeList() {
      const listEl = document.getElementById('knowledge-list');
      const countEl = document.getElementById('knowledge-result-count');
      if (!listEl || !countEl) return;
      const list = filterPlantDatabase(selectedKnowledgeCategory, knowledgeSearch);
      countEl.textContent = `找到 ${list.length} 種植物`;
      listEl.innerHTML = list.length ? list.map(p => `<div class="knowledge-item" onclick='openKnowledge(${JSON.stringify(p.name)})'><div><strong>${p.name}</strong><span class="ease-pill">${escapeHTML(maintenanceProfile(p))}</span><p class="hint">${escapeHTML(getPlantCategory(p))}｜約 ${p.interval} 天檢查水分</p></div><span>›</span></div>`).join('') : `<div class="empty"><h3>找不到植物</h3><p>可以換管理難度，或搜尋「蘭」「竹芋」「仙人掌」「香草」。</p></div>`;
    }

    function openKnowledge(name) {
      selectedKnowledge = name;
      renderKnowledgeDetail(name);
      setScreen('knowledge-detail');
    }

    function renderKnowledgeDetail(name) {
      const p = getPlantInfo(name);
      document.getElementById('screen-knowledge-detail').innerHTML = `
        <button class="light small" onclick="setScreen('knowledge')">← 返回知識庫</button>
        <div class="card">
          <h2>${escapeHTML(p.name)}</h2>
          <p class="subtitle">管理難度：${escapeHTML(maintenanceProfile(p))}</p><span class="ease-pill">${escapeHTML(getEaseAdvice(p))}</span>
          <div class="divider"></div>
          <h3>適合誰</h3>
          <p>${escapeHTML(getSuitableFor(p))}</p>
          <div class="divider"></div>
          <h3>個性標籤</h3>
          <p>${escapeHTML(p.personality)}</p>
          <div class="divider"></div>
          <h3>入手與配置建議</h3>
          <p>${escapeHTML(getBuyingAdvice(p))}</p>
          <div class="divider"></div>
          <h3>照護重點</h3>
          <p>${escapeHTML(p.note)}</p>
          <div class="divider"></div>
          <h3>原生地故事</h3>
          <p>${escapeHTML(p.originStory)}</p>
          <div class="divider"></div>
          <h3>植物趣事</h3>
          <p>${escapeHTML(p.funFact)}</p>
          <div class="divider"></div>
          <h3>照護提醒</h3>
          <p>${escapeHTML(p.beginnerTip)}</p>
          <div class="divider"></div>
          <h3>進階觀察重點</h3>
          <p>${escapeHTML(p.expertNote)}</p>
          <div class="divider"></div>
          <h3>基本需求</h3>
          <p>☀️ 光照：${escapeHTML(p.light)}</p>
          <p>💧 澆水：${escapeHTML(p.watering)}</p>
          <p>🪴 建議：大約 ${p.interval} 天檢查一次土壤，不要照天數盲目澆水。</p>
          ${renderAirPlantReminder(p)}
          <button class="full" onclick='startAddPlant(${JSON.stringify(p.name)})'>加入我的植物</button>
        </div>`;
    }

    function startAddPlant(name) {
      const info = getPlantInfo(name);
      selectedAddPlantName = info.name;
      selectedAddCategory = maintenanceProfile(info);
      addPlantSearch = '';
      setScreen('add');
    }

    function renderAnalysis() {
      const summary = careSummary30Days();
      const abnormalPlants = appData.plants.filter(p => p.healthStatus && p.healthStatus !== '健康').length;
      const profiles = appData.plants.reduce((map, plant) => {
        const key = maintenanceProfile(plant);
        map[key] = (map[key] || 0) + 1;
        return map;
      }, {});
      document.getElementById('screen-analysis').innerHTML = `
        <h2>照護分析</h2>
        <p class="subtitle">以最近 30 天紀錄檢視收藏狀態、照護節奏與風險訊號。</p>
        <div class="card">
          <h3>近 30 天照護統計</h3>
          <div class="grid-3">
            <div class="stat"><strong>${summary.waters}</strong><span>澆水次數</span></div>
            <div class="stat"><strong>${summary.observations}</strong><span>觀察次數</span></div>
            <div class="stat"><strong>${summary.fertilizers}</strong><span>施肥次數</span></div>
            <div class="stat"><strong>${summary.abnormal}</strong><span>異常紀錄數</span></div>
            <div class="stat"><strong>${summary.avgWaterInterval}</strong><span>平均澆水間隔</span></div>
            <div class="stat"><strong>${escapeHTML(summary.topType)}</strong><span>最常照護類型</span></div>
          </div>
        </div>
        <div class="card">
          <h3>收藏狀態摘要</h3>
          <p>收藏植物：${appData.plants.length} 筆｜異常狀態：${abnormalPlants} 筆</p>
          <p>養護型態分布：${Object.entries(profiles).map(([k, v]) => `${escapeHTML(k)} ${v}`).join('｜') || '尚無資料'}</p>
          <button class="full secondary" onclick="setScreen('academy')">查看能力系統</button>
        </div>`;
    }

    function renderSettings() {
      const g = gameStats();
      document.getElementById('screen-settings').innerHTML = `
        <h2>設定</h2>
        <div class="card game-card">
          <h3>能力系統摘要</h3>
          <p>熟練度等級：Lv.${g.level}｜${g.title.title}</p>
          <div class="xp-bar"><div class="xp-fill" style="--xp:${g.currentXp}%"></div></div>
          <p class="hint">能力點數：${g.xp}｜連續追蹤：${g.streak} 天</p>
          <div class="badge-grid">${g.badges.map(b => `<span class="badge-pill ${b.unlocked ? '' : 'locked'}">${b.icon} ${b.name}</span>`).join('')}</div>
          <button class="full secondary" onclick="setScreen('academy')">查看能力系統</button>
        </div>
        <div class="card">
          <h3>資料備份</h3>
          <p>目前資料儲存在這台裝置的瀏覽器中。若更換手機或清除瀏覽器資料，資料可能會消失。</p>
          <div class="divider"></div>
          <p>植物：${appData.plants.length} 盆</p>
          <p>照護紀錄：${appData.careLogs.length} 筆</p>
          <div class="actions">
            <button onclick="exportData()">匯出我的植物資料</button>
            <button class="secondary" onclick="document.getElementById('import-file').click()">匯入備份檔</button>
          </div>
        </div>
        <div class="soft-card">
          <h3>儲存方式說明</h3>
          <p>第一版不需要登入。資料會自動保存在這台裝置。建議定期匯出備份。</p>
        </div>
        <div class="card">
          <h3>加入手機主畫面</h3>
          <p>如果之後把這個檔案部署成網站，就可以像 App 一樣加入手機主畫面。</p>
          <ol class="install-steps">
            <li>用 Safari 或 Chrome 打開網站。</li>
            <li>點分享按鈕。</li>
            <li>選擇「加入主畫面」。</li>
            <li>桌面會出現「植物綠手指」。</li>
          </ol>
          <button class="full secondary" onclick="resetOnboarding()">重新觀看系統導覽</button>
        </div>
        <div class="card">
          <h3 class="danger-text">危險操作</h3>
          <p>清除後無法復原。請先匯出備份。</p>
          <button class="full danger" onclick="clearAllData()">清除全部資料</button>
        </div>`;
    }

    function exportData() {
      const payload = { ...appData, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `plant-green-thumb-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('備份檔已匯出。');
    }

    document.getElementById('import-file').addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      if (!confirm('匯入備份會覆蓋目前資料，確定要繼續嗎？')) { event.target.value = ''; return; }
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        if (!Array.isArray(imported.plants) || !Array.isArray(imported.careLogs)) throw new Error('格式錯誤');
        appData = { ...blankData(), ...imported };
        saveData();
        renderAll();
        setScreen('today');
        showToast('備份已匯入。');
      } catch (error) {
        showToast('匯入失敗：檔案格式不正確。');
      } finally {
        event.target.value = '';
      }
    });

    function clearAllData() {
      if (!confirm('確定要清除全部資料嗎？這個動作無法復原。')) return;
      appData = blankData();
      saveData();
      selectedPlantId = null;
      renderAll();
      setScreen('today');
      showToast('全部資料已清除。');
    }

    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.nav;
        setScreen(target);
      });
    });

    appData.version = '1.7.0';
    saveData();
    renderAll();
  </script>
</body>
</html>
