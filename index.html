<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3f7d58" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="植物綠手指" />
  <meta name="description" content="植物照護、遊戲化學習與植物達人養成 Web App。" />
  <link rel="manifest" href="plant-green-thumb-manifest.json" />
  <link rel="apple-touch-icon" href="plant-green-thumb-icon-192.png" />
  <title>植物綠手指</title>
  <style>
    :root {
      --bg: #f6f3ea;
      --card: #ffffff;
      --green: #3f7d58;
      --green-dark: #2f6244;
      --green-soft: #e4f0e7;
      --text: #223026;
      --muted: #6f7d72;
      --warning: #bd6b2f;
      --danger: #a53f3f;
      --line: #e4dfd3;
      --shadow: 0 10px 25px rgba(40, 60, 45, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 104px;
      background: linear-gradient(180deg, #f9f6ed 0%, #f1eee5 100%);
    }

    header {
      padding: 8px 2px 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--green-soft);
      font-size: 24px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; letter-spacing: 0.5px; }
    h2 { font-size: 22px; margin-bottom: 8px; }
    h3 { font-size: 17px; margin-bottom: 8px; }
    p { line-height: 1.65; }

    .subtitle { color: var(--muted); font-size: 14px; margin-top: 2px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fade 0.18s ease; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(228, 223, 211, 0.75);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 12px 0;
    }

    .soft-card {
      background: var(--green-soft);
      border: 1px solid #d3e6d7;
      border-radius: var(--radius);
      padding: 15px;
      margin: 12px 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      background: #fff;
      border-radius: 16px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #e7e1d6;
    }

    .stat strong { display: block; font-size: 20px; color: var(--green-dark); }
    .stat span { font-size: 12px; color: var(--muted); }

    button, .button-like {
      border: 0;
      border-radius: 999px;
      padding: 11px 15px;
      background: var(--green);
      color: white;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    button.secondary { background: #eef3ec; color: var(--green-dark); }
    button.light { background: #fff; color: var(--green-dark); border: 1px solid #dce6dc; }
    button.danger { background: #fff0ed; color: var(--danger); border: 1px solid #efc8c1; }
    button.full { width: 100%; margin-top: 10px; }
    button.small { padding: 8px 12px; font-size: 13px; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin: 14px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #ded8cd;
      border-radius: 15px;
      padding: 12px 13px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea { min-height: 84px; resize: vertical; }

    .finder-tools {
      display: grid;
      gap: 10px;
      margin: 12px 0;
    }

    .category-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 6px;
      scrollbar-width: none;
    }

    .category-row::-webkit-scrollbar { display: none; }

    .plant-picker {
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .plant-option {
      width: 100%;
      text-align: left;
      border-radius: 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
    }

    .plant-option:last-child { border-bottom: 0; }

    .plant-option.active {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .plant-option small {
      display: block;
      color: var(--muted);
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.4;
    }

    .selected-plant {
      background: #f7fbf4;
      border: 1px solid #d6e8d9;
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
    }


    .ease-guide {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .ease-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px;
      background: #fffdf8;
    }

    .ease-card strong {
      display: block;
      color: var(--green-dark);
      margin-bottom: 4px;
    }

    .ease-card .hint {
      margin-bottom: 8px;
    }

    .recommend-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
    }

    .recommend-chip {
      background: #eef6e8;
      color: var(--green-dark);
      border: 1px solid #d7e8cf;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .ease-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 4px 8px;
      background: #f2f7ee;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 800;
      margin-top: 6px;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
      margin: 4px 0 8px;
    }

    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .pill {
      padding: 9px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #ddd6ca;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .pill.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }

    .plant-title { font-size: 18px; font-weight: 800; }
    .meta { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .hint { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .warning { color: var(--warning); font-weight: 700; }
    .danger-text { color: var(--danger); font-weight: 700; }

    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--muted);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(480px, 100%);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--line);
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      z-index: 10;
    }

    .nav button {
      background: transparent;
      color: var(--muted);
      padding: 8px 2px;
      border-radius: 14px;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav button.active {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .nav .icon { font-size: 18px; }

    .knowledge-item, .symptom-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .knowledge-item:last-child, .symptom-item:last-child { border-bottom: 0; }

    .list-log {
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .list-log:last-child { border-bottom: 0; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 88px;
      transform: translateX(-50%);
      width: min(420px, calc(100% - 32px));
      background: #203427;
      color: #fff;
      border-radius: 18px;
      padding: 13px 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
      display: none;
      z-index: 20;
      font-size: 14px;
    }

    .toast.show { display: block; animation: fade 0.15s ease; }


    .game-card {
      background: linear-gradient(135deg, #e9f5df 0%, #ffffff 100%);
      border: 1px solid rgba(63, 125, 88, 0.18);
    }

    .level-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .level-pill, .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .xp-bar {
      height: 10px;
      background: #dfe7d8;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 8px;
    }

    .xp-fill {
      height: 100%;
      width: var(--xp, 0%);
      background: var(--green);
      border-radius: 999px;
    }

    .badge-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge-pill.locked {
      background: #f1eee5;
      color: var(--muted);
      font-weight: 600;
    }


    .academy-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .skill-card {
      background: #fff;
      border: 1px solid #e7e1d6;
      border-radius: 18px;
      padding: 13px;
    }

    .skill-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .mini-bar {
      height: 8px;
      background: #e9e4d9;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .mini-fill {
      height: 100%;
      width: var(--value, 0%);
      background: var(--green);
      border-radius: 999px;
    }

    .quiz-option {
      width: 100%;
      justify-content: flex-start;
      text-align: left;
      margin-top: 8px;
      background: #fff;
      color: var(--text);
      border: 1px solid #ded8cd;
    }

    .quiz-option.correct {
      background: var(--green-soft);
      color: var(--green-dark);
      border-color: #b7d8bf;
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: var(--green-soft);
      color: var(--green-dark);
      font-weight: 800;
      margin-bottom: 8px;
    }



    .hero-card {
      background: radial-gradient(circle at top left, #f3f8e8 0%, #ffffff 52%, #f9f6ed 100%);
      border: 1px solid rgba(63, 125, 88, 0.16);
    }

    .top-quest {
      border-left: 5px solid var(--green);
    }

    .quest-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .quest-item:last-child { border-bottom: 0; }
    .quest-check { font-size: 18px; line-height: 1.35; }
    .quest-item.done strong { text-decoration: line-through; color: var(--muted); }

    .install-steps {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .onboarding-overlay {
      position: fixed;
      inset: 0;
      background: rgba(31, 49, 36, 0.36);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }

    .onboarding-overlay.show { display: flex; }

    .onboarding-panel {
      width: min(480px, 100%);
      background: #fff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.24);
      border: 1px solid rgba(228, 223, 211, 0.9);
    }

    .onboarding-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .onboarding-step:last-child { border-bottom: 0; }
    .step-icon { font-size: 24px; width: 30px; text-align: center; }

    @media (max-width: 390px) {
      .nav button { font-size: 11px; }
      .nav .icon { font-size: 16px; }
      h1 { font-size: 22px; }
      h2 { font-size: 20px; }
    }

    .divider { height: 1px; background: var(--line); margin: 14px 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="logo">🌱</div>
        <div>
          <h1>植物綠手指</h1>
          <p class="subtitle">今天先看植物真正需要什麼</p>
        </div>
      </div>
    </header>

    <section id="screen-today" class="screen active"></section>
    <section id="screen-plants" class="screen"></section>
    <section id="screen-add" class="screen"></section>
    <section id="screen-detail" class="screen"></section>
    <section id="screen-log" class="screen"></section>
    <section id="screen-diagnosis" class="screen"></section>
    <section id="screen-diagnosis-result" class="screen"></section>
    <section id="screen-knowledge" class="screen"></section>
    <section id="screen-knowledge-detail" class="screen"></section>
    <section id="screen-academy" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </main>

  <nav class="nav">
    <button data-nav="today" class="active"><span class="icon">☀️</span>今日</button>
    <button data-nav="plants"><span class="icon">🪴</span>植物</button>
    <button data-nav="diagnosis"><span class="icon">🩺</span>診斷</button>
    <button data-nav="knowledge"><span class="icon">📚</span>知識</button>
    <button data-nav="academy"><span class="icon">🌟</span>達人</button>
    <button data-nav="settings"><span class="icon">⚙️</span>設定</button>
  </nav>

  <div id="toast" class="toast"></div>
  <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
  <div id="onboarding" class="onboarding-overlay"></div>

  <script>
    const STORAGE_KEY = 'plantGreenThumb.v1';

    const plantDatabase = [
      { name: '黃金葛', difficulty: '低', interval: 6, light: '明亮散射光', watering: '土壤偏乾再澆透', note: '耐陰、好照顧，怕長期積水。' },
      { name: '虎尾蘭', difficulty: '低', interval: 12, light: '明亮散射光到半日照', watering: '乾透後再澆', note: '非常耐旱，最怕太常澆水。' },
      { name: '龜背芋', difficulty: '中', interval: 6, light: '明亮散射光', watering: '表土乾後澆透', note: '喜歡明亮環境，避免烈日直曬。' },
      { name: '發財樹', difficulty: '中', interval: 9, light: '明亮散射光', watering: '寧乾勿濕', note: '根系怕悶濕，盆土不要長期潮濕。' },
      { name: '白鶴芋', difficulty: '中', interval: 4, light: '明亮散射光', watering: '土表乾就檢查', note: '缺水會垂葉，但也怕積水。' },
      { name: '吊蘭', difficulty: '低', interval: 5, light: '明亮散射光', watering: '土表乾後澆透', note: '適應力強，適合新手。' },
      { name: '蘆薈', difficulty: '低', interval: 12, light: '半日照到強光', watering: '乾透再澆', note: '多肉質植物，怕過濕。' },
      { name: '多肉植物', difficulty: '中', interval: 12, light: '明亮光到半日照', watering: '乾透再澆', note: '光線不足容易徒長。' },
      { name: '琴葉榕', difficulty: '中高', interval: 6, light: '明亮散射光', watering: '表土乾後澆透', note: '對環境變動敏感，避免頻繁移動。' },
      { name: '薄荷', difficulty: '中', interval: 3, light: '半日照到強光', watering: '保持微濕但不積水', note: '生長快，需水量較高。' },
      { name: '羅勒', difficulty: '中', interval: 3, light: '半日照到強光', watering: '土表乾後澆透', note: '喜歡充足光照與穩定水分，適合陽台。' },
      { name: '迷迭香', difficulty: '中高', interval: 7, light: '強光到半日照', watering: '偏乾再澆，避免悶濕', note: '喜歡通風與排水佳的介質，怕潮濕悶根。' },
      { name: '薰衣草', difficulty: '中高', interval: 7, light: '強光', watering: '乾透再澆', note: '需要充足日照與良好通風，台灣潮濕環境要控水。' },
      { name: '九層塔', difficulty: '中', interval: 3, light: '半日照到強光', watering: '土表乾後澆透', note: '生長快、需光多，缺水容易萎垂。' },
      { name: '香菜', difficulty: '中', interval: 3, light: '半日照', watering: '保持微濕但不積水', note: '怕高溫，炎熱環境容易抽苔或衰弱。' },
      { name: '蔥', difficulty: '低', interval: 4, light: '半日照到強光', watering: '土表乾後澆透', note: '適合陽台栽培，保持通風與排水即可。' },
      { name: '龜背竹', difficulty: '中', interval: 6, light: '明亮散射光', watering: '表土乾後澆透', note: '大型觀葉植物，喜歡高濕與明亮環境。' },
      { name: '合果芋', difficulty: '低', interval: 5, light: '明亮散射光', watering: '土表微乾再澆', note: '適應力強，但斑葉品種需要較明亮光線。' },
      { name: '粗肋草', difficulty: '低', interval: 6, light: '明亮散射光', watering: '土表乾後澆透', note: '耐陰但怕冷，適合室內明亮處。' },
      { name: '蔓綠絨', difficulty: '低到中', interval: 6, light: '明亮散射光', watering: '表土乾後澆透', note: '多數品種好照顧，避免長期積水。' },
      { name: '心葉蔓綠絨', difficulty: '低', interval: 6, light: '明亮散射光', watering: '土壤偏乾再澆透', note: '耐陰、垂吊好看，適合室內新手。' },
      { name: '粉紅公主蔓綠絨', difficulty: '中高', interval: 6, light: '明亮散射光', watering: '表土乾後澆透', note: '斑葉品種需明亮光線，但避免烈日。' },
      { name: '海芋', difficulty: '中高', interval: 5, light: '明亮散射光', watering: '保持微濕但不積水', note: '喜歡濕度，但塊莖與根系怕爛。' },
      { name: '姑婆芋', difficulty: '中', interval: 5, light: '明亮散射光到半日照', watering: '表土乾後澆透', note: '葉片大、蒸散快，需注意通風與水分。' },

    function getPlantCategory(plant) {
      if (firstPlantPicks.includes(plant.name)) return '第一盆首選';
      if (beginnerPlants.includes(plant.name)) return '新手友善';
      for (const [category, names] of Object.entries(categoryRules)) {

      }
      return '室內觀葉';
    }

    function getEaseLevel(plant) {
      if (firstPlantPicks.includes(plant.name)) return '第一盆首選';
      if (plant.difficulty === '低') return '很好養';
      if (plant.difficulty === '低到中') return '好養';
      if (plant.difficulty === '中') return '普通';
      if (plant.difficulty === '中高') return '稍難';
      if (plant.difficulty === '高') return '高難度';
      return '普通';
    }

        return matchCategory && matchKeyword;

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return blankData();
      try {
        const parsed = JSON.parse(raw);
        return { ...blankData(), ...parsed, plants: parsed.plants || [], careLogs: parsed.careLogs || [], settings: { ...blankData().settings, ...(parsed.settings || {}), academy: { ...blankData().settings.academy, ...((parsed.settings || {}).academy || {}) } } };

    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2, 8)}`;
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDate(dateString) {
      if (!dateString) return '尚未記錄';
      const d = new Date(dateString + 'T00:00:00');
      return `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    }

    function addDays(dateString, days) {
      const d = new Date(dateString + 'T00:00:00');
      d.setDate(d.getDate() + Number(days || 0));
      return d.toISOString().slice(0, 10);
    }

    function daysBetween(a, b) {
      const da = new Date(a + 'T00:00:00');
      const db = new Date(b + 'T00:00:00');
      return Math.floor((da - db) / 86400000);
    }

    function getPlantInfo(name) {
      return plantDatabase.find(p => p.name === name) || plantDatabase[0];
    }

    function nextWaterDate(plant) {
      return addDays(plant.lastWateredAt || todayISO(), plant.waterIntervalDays || getPlantInfo(plant.name).interval);
    }

    function plantNeedsWater(plant) {
      return todayISO() >= nextWaterDate(plant);
    }

    function careXp(type) {
      const xpMap = { '觀察': 5, '澆水': 10, '施肥': 12, '修剪': 12, '換盆': 20, '除蟲': 18, '小測驗': 8, '知識卡': 4, '學習': 2 };
      return xpMap[type] || 5;
    }

    function gameStats() {
      const xp = appData.careLogs.reduce((sum, log) => sum + careXp(log.type), 0) + appData.plants.length * 15;
      const level = Math.floor(xp / 100) + 1;
      const currentXp = xp % 100;
      const nextXp = 100 - currentXp;
      const uniqueDates = [...new Set(appData.careLogs.map(l => l.date).filter(Boolean))].sort().reverse();
      let streak = 0;
      let cursor = new Date(todayISO() + 'T00:00:00');
      const dateSet = new Set(uniqueDates);
      if (!dateSet.has(todayISO())) cursor.setDate(cursor.getDate() - 1);
      while (dateSet.has(cursor.toISOString().slice(0, 10))) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      }
      const readCount = Object.values(academySettings().readCards || {}).filter(Boolean).length;
      const quizCount = appData.careLogs.filter(l => l.type === '小測驗').length;
      const badges = [
        { name: '第一盆夥伴', icon: '🌱', unlocked: appData.plants.length >= 1 },
        { name: '照護起步', icon: '💧', unlocked: appData.careLogs.length >= 1 },
        { name: '不亂澆水的人', icon: '🖐️', unlocked: appData.careLogs.filter(l => l.type === '觀察').length >= 5 },
        { name: '葉片觀察者', icon: '👀', unlocked: appData.careLogs.filter(l => l.type === '觀察').length >= 10 },
        { name: '植物小隊', icon: '🪴', unlocked: appData.plants.length >= 3 },
        { name: '七日園丁', icon: '🏅', unlocked: streak >= 7 },
        { name: '知識收藏家', icon: '📚', unlocked: readCount >= 5 },
        { name: '植物小博士', icon: '🧠', unlocked: quizCount >= 5 },
        { name: '紀錄達人', icon: '📓', unlocked: appData.careLogs.length >= 20 }
      ];
      const title = titleForLevel(level);
      return { xp, level, currentXp, nextXp, streak, badges, unlockedBadges: badges.filter(b => b.unlocked), title };
    }

      return appData.careLogs.some(l => l.plantId === id && l.type === '觀察' && l.date === todayISO());

    function titleForLevel(level) {
      return titleStages.find(s => level >= s.min && level <= s.max) || titleStages[titleStages.length - 1];
    }

    function dailyIndex(length, salt = 0) {
      const digits = todayISO().replaceAll('-', '');
      return (Number(digits) + salt) % length;

    function skillProgress(skillKey) {
      const logs = appData.careLogs;
      const observations = logs.filter(l => l.type === '觀察').length;
      const waters = logs.filter(l => l.type === '澆水').length;
      const diagnostics = logs.filter(l => (l.note || '').includes('診斷') || l.type === '除蟲').length;
      const quizzes = logs.filter(l => l.type === '小測驗').length;
      const reads = Object.values(academySettings().readCards || {}).filter(Boolean).length;
      const plants = appData.plants.length;
      const map = {
        water: Math.min(100, observations * 10 + waters * 8),
        light: Math.min(100, observations * 8 + reads * 6),
        soil: Math.min(100, waters * 6 + plants * 8 + reads * 5),
        growth: Math.min(100, logs.filter(l => ['施肥','修剪','換盆'].includes(l.type)).length * 18 + reads * 5),
        diagnosis: Math.min(100, diagnostics * 18 + quizzes * 10),
        record: Math.min(100, logs.length * 5)
      };
      return map[skillKey] || 0;
    }

    function answerQuiz(choiceIndex) {
      const academy = academySettings();

      }
      const quiz = dailyQuiz();
      const correct = choiceIndex === quiz.answer;
      academy.answeredQuizDates[todayISO()] = { correct, choiceIndex, explain: quiz.explain };
      appData.careLogs.push({ id: uid('log'), plantId: null, type: correct ? '小測驗' : '學習', date: todayISO(), note: `今日小測驗：${correct ? '答對' : '答錯'}。${quiz.explain}`, createdAt: new Date().toISOString() });
      saveData();
      renderAll();
      setScreen('academy');
      showToast(correct ? '答對了，獲得 8 XP。' : '答錯沒關係，已記錄學習，獲得 2 XP。');
    }

    function readKnowledgeCard(cardId) {
      const academy = academySettings();
      if (academy.readCards[cardId]) {
        showToast('這張知識卡已經收藏。');
        return;
      }
      const card = knowledgeCards.find(c => c.id === cardId);
      academy.readCards[cardId] = true;
      appData.careLogs.push({ id: uid('log'), plantId: null, type: '知識卡', date: todayISO(), note: `收藏知識卡：${card ? card.title : cardId}`, createdAt: new Date().toISOString() });
      saveData();
      renderAll();
      setScreen('academy');
      showToast('已收藏知識卡，獲得 4 XP。');
    }

    function renderToday() {
      const plants = appData.plants;
      const needs = plants.filter(plantNeedsWater);
      const watch = plants.filter(p => p.healthStatus && p.healthStatus !== '健康');
      const stable = plants.filter(p => !plantNeedsWater(p) && (!p.healthStatus || p.healthStatus === '健康'));
      const html = `
        <h2>今日修煉</h2>
        <p class="subtitle">今天是 ${formatDate(todayISO())}｜先觀察，再行動。</p>
        ${renderGameSummary()}
        ${renderDailyTraining()}
        ${renderStarterQuest()}
        <div class="soft-card">
          <h3>今日總覽</h3>
          <div class="grid-3">
            <div class="stat"><strong>${needs.length}</strong><span>建議檢查澆水</span></div>
            <div class="stat"><strong>${watch.length}</strong><span>需要觀察</span></div>
            <div class="stat"><strong>${stable.length}</strong><span>狀況穩定</span></div>
          </div>
        </div>
        ${plants.length === 0 ? `
          <div class="card empty">
            <h3>還沒有植物</h3>
            <p>先新增你的第一盆植物，之後每天打開這裡，就能看到照護提醒。</p>
            <button class="full" onclick="setScreen('add')">+ 新增植物</button>

        ${plants.map(p => todayPlantCard(p)).join('')}
        <div class="card">
          <h3>今日提醒</h3>
          <p>植物通常不是忘記照顧死掉，而是太常澆水出問題。先摸土，再決定。</p>
        </div>`;
      document.getElementById('screen-today').innerHTML = html;
    }

    function renderGameSummary() {
      const g = gameStats();
      const badges = g.unlockedBadges.length ? g.unlockedBadges.slice(0, 3).map(b => `<span class="badge-pill">${b.icon} ${b.name}</span>`).join('') : '<span class="badge-pill locked">尚未獲得徽章</span>';
      return `
        <div class="card game-card">
          <div class="level-row">
            <div>
              <h3>Lv.${g.level}｜${g.title.title}</h3>
              <p class="hint">${g.title.ability}。完成觀察、測驗與知識卡，就能累積真正能力。</p>
            </div>
            <span class="level-pill">🌟 ${g.title.title}</span>
          </div>
          <div class="xp-bar"><div class="xp-fill" style="--xp:${g.currentXp}%"></div></div>
          <p class="hint">目前 ${g.xp} XP｜距離下一級還差 ${g.nextXp} XP｜連續照護 ${g.streak} 天</p>
          <div class="badge-grid">${badges}</div>
        </div>`;
    }

    function todayPlantCard(p) {
      const info = getPlantInfo(p.name);
      const next = nextWaterDate(p);
      const needsWater = plantNeedsWater(p);
      const abnormal = p.healthStatus && p.healthStatus !== '健康';
      const advice = abnormal ? `目前狀態是「${escapeHTML(p.healthStatus)}」，建議先做症狀診斷。` : needsWater ? '建議今天檢查土壤。土壤 2 公分以下也乾了，再澆透。' : `今天先不用急著澆水。建議 ${formatDate(next)} 再檢查。`;
      return `
        <div class="card">
          <div class="row">
            <div>
              <div class="plant-title">🪴 ${escapeHTML(p.name)}「${escapeHTML(p.nickname || '未命名')}」</div>
              <div class="meta">${escapeHTML(p.location || '未設定位置')}｜${escapeHTML(p.light || info.light)}</div>
            </div>
            <span>${abnormal ? '👀' : needsWater ? '💧' : '🌿'}</span>
          </div>
          <p class="hint">上次澆水：${formatDate(p.lastWateredAt)}｜下次建議：${formatDate(next)}</p>
          <p style="margin-top:10px;">${advice}</p>
          <div class="actions">
            <button class="small secondary" onclick="quickObserve('${p.id}')">完成觀察 +5XP</button>
            <button class="small" onclick="quickWater('${p.id}')">記錄澆水 +10XP</button>
            <button class="small secondary" onclick="openDetail('${p.id}')">查看</button>
          </div>
        </div>`;
    }

    function renderPlants() {
      const html = `
        <div class="row">
          <div>
            <h2>我的植物</h2>
            <p class="subtitle">目前共有 ${appData.plants.length} 盆植物</p>
          </div>
          <button class="small" onclick="setScreen('add')">+ 新增</button>
        </div>
        ${appData.plants.length === 0 ? `<div class="card empty"><h3>你的植物清單是空的</h3><p>建立第一盆植物後，這裡會顯示澆水與健康狀態。</p><button class="full" onclick="setScreen('add')">新增植物</button></div>` : ''}
        ${appData.plants.map(p => `
          <div class="card">
            <div class="plant-title">🪴 ${escapeHTML(p.name)}</div>
            <p class="meta">暱稱：${escapeHTML(p.nickname || '未命名')}</p>
            <p class="meta">位置：${escapeHTML(p.location || '未設定')}</p>
            <div class="divider"></div>
            <p>上次澆水：${formatDate(p.lastWateredAt)}</p>
            <p>下次建議：${formatDate(nextWaterDate(p))}</p>
            <p>狀態：${escapeHTML(p.healthStatus || '健康')}</p>

          </div>
        `).join('')}`;

      if (!getPlantInfo(selectedAddPlantName)) selectedAddPlantName = plantDatabase[0].name;
      document.getElementById('screen-add').innerHTML = `
        <h2>新增植物</h2>
        <p class="subtitle">植物很多時，先用「第一盆首選」或容易度分類，再搜尋會更快。</p>
        <div class="card">
          <label>植物種類</label>
          <div class="finder-tools">
            <input id="add-plant-search" placeholder="搜尋植物，例如：黃金葛、蘭、薄荷、仙人掌" value="${escapeHTML(addPlantSearch)}" oninput="setAddPlantSearch(this.value)" />
            <div class="category-row">
              ${plantCategories.concat(easeCategories.filter(c => !plantCategories.includes(c))).map(c => `<button type="button" class="small ${selectedAddCategory === c ? '' : 'light'}" onclick="setAddPlantCategory('${c}')">${c}</button>`).join('')}

            <div id="add-selected-plant" class="selected-plant"></div>
            <p id="add-result-count" class="result-count"></p>

          <input id="add-nickname" placeholder="例如：小綠" />
          <label>放置位置</label>
          <input id="add-location" placeholder="例如：客廳窗邊" />
          <label>光照程度</label>
          <select id="add-light"><option>強光</option><option selected>明亮散射光</option><option>半日照</option><option>陰暗</option></select>
          <label>盆器大小</label>

          <button class="full" onclick="createPlant()">建立植物</button>

    }

    function setAddPlantCategory(category) {
      selectedAddCategory = category;
      renderAdd();
    }

    function setAddPlantSearch(value) {
      addPlantSearch = value;
      renderAddPlantPicker();
    }

    function chooseAddPlant(name) {
      selectedAddPlantName = name;
      renderAddPlantPicker();
    }

    function renderAddPlantPicker() {
      const picker = document.getElementById('add-plant-picker');
      const selectedBox = document.getElementById('add-selected-plant');
      const count = document.getElementById('add-result-count');
      if (!picker || !selectedBox || !count) return;
      const selected = getPlantInfo(selectedAddPlantName);
      const list = filterPlantDatabase(selectedAddCategory, addPlantSearch);
      selectedBox.innerHTML = `
        <strong>目前選擇：${escapeHTML(selected.name)}</strong>
        <p class="hint">${escapeHTML(getPlantCategory(selected))}｜${escapeHTML(getEaseLevel(selected))}｜約 ${selected.interval} 天檢查澆水</p>`;
      count.textContent = `找到 ${list.length} 種植物`;
      picker.innerHTML = list.length ? list.map(p => `
        <button type="button" class="plant-option ${p.name === selectedAddPlantName ? 'active' : ''}" onclick='chooseAddPlant(${JSON.stringify(p.name)})'>
          <span><strong>${escapeHTML(p.name)}</strong><small>${escapeHTML(getPlantCategory(p))}｜${escapeHTML(getEaseLevel(p))}｜${escapeHTML(p.light)}</small></span>
          <span>${p.name === selectedAddPlantName ? '✓' : '›'}</span>
        </button>`).join('') : `<div class="empty"><h3>找不到植物</h3><p>可以換個關鍵字，例如「蘭」「蕨」「多肉」「薄荷」。</p></div>`;
    }

    function createPlant() {
      const name = selectedAddPlantName || plantDatabase[0].name;
      const info = getPlantInfo(name);
      const now = new Date().toISOString();
      const plant = {
        id: uid('plant'),
        name,
        nickname: document.getElementById('add-nickname').value.trim(),
        location: document.getElementById('add-location').value.trim(),
        light: document.getElementById('add-light').value,
        potSize: document.getElementById('add-pot').value,
        soilDrainage: document.getElementById('add-soil').value,
        lastWateredAt: document.getElementById('add-watered').value || todayISO(),
        waterIntervalDays: info.interval,
        healthStatus: document.getElementById('add-health').value,
        notes: document.getElementById('add-notes').value.trim(),
        createdAt: now,
        updatedAt: now
      };
      appData.plants.push(plant);
      saveData();
      renderAll();
      showToast(`已新增 ${plant.name}「${plant.nickname || '未命名'}」，資料已自動儲存。`);
      selectedPlantId = plant.id;
      renderDetail(plant.id);
      setScreen('detail');
    }

    function openDetail(id) {
      selectedPlantId = id;
      renderDetail(id);
      setScreen('detail');
    }

    function renderDetail(id) {
      const p = appData.plants.find(x => x.id === id);
      if (!p) return;
      const info = getPlantInfo(p.name);
      const logs = appData.careLogs.filter(l => l.plantId === id).sort((a,b) => b.date.localeCompare(a.date));
      document.getElementById('screen-detail').innerHTML = `
        <button class="light small" onclick="setScreen('plants')">← 返回</button>
        <div class="card">
          <h2>${escapeHTML(p.name)}「${escapeHTML(p.nickname || '未命名')}」</h2>
          <p class="subtitle">${escapeHTML(p.location || '未設定位置')}｜${escapeHTML(p.light || info.light)}</p>
          <div class="divider"></div>
          <h3>目前狀態</h3>
          <p>🌿 ${escapeHTML(p.healthStatus || '健康')}</p>
          <p>⭐ 難度：${escapeHTML(info.difficulty)}｜照護間隔：約 ${p.waterIntervalDays || info.interval} 天檢查一次</p>
          <p>上次澆水：${formatDate(p.lastWateredAt)}</p>
          <p>建議下次檢查：${formatDate(nextWaterDate(p))}</p>
          <div class="actions">
            <button onclick="quickWater('${p.id}')">記錄澆水</button>
            <button class="secondary" onclick="openLog('${p.id}')">新增紀錄</button>
          </div>
        </div>
        <div class="card">
          <h3>今日建議</h3>
          <p>${plantNeedsWater(p) ? '今天可以檢查土壤。若土壤 2 公分以下也乾了，再澆透。' : '今天先不用急著澆水。如果土壤表面還濕，請再等。'}</p>
        </div>
        <div class="card">
          <h3>基本照護</h3>
          <p>💧 澆水：${escapeHTML(info.watering)}</p>
          <p>☀️ 光照：${escapeHTML(info.light)}</p>
          <p>🌱 難度：${escapeHTML(info.difficulty)}</p>
          <p class="hint">${escapeHTML(info.note)}</p>
        </div>
        <div class="card">
          <h3>照護紀錄</h3>
          ${logs.length === 0 ? '<p class="hint">尚無照護紀錄。</p>' : logs.map(l => `<div class="list-log"><strong>${formatDate(l.date)}｜${escapeHTML(l.type)}</strong><p class="hint">${escapeHTML(l.note || '無備註')}</p></div>`).join('')}
          <button class="full secondary" onclick="openLog('${p.id}')">+ 新增紀錄</button>
        </div>
        <button class="full danger" onclick="deletePlant('${p.id}')">刪除此植物</button>`;
    }

    function openLog(id) {
      selectedPlantId = id;
      renderLog(id);
      setScreen('log');
    }

    function renderLog(id) {
      const p = appData.plants.find(x => x.id === id);
      if (!p) return;
      document.getElementById('screen-log').innerHTML = `
        <button class="light small" onclick="openDetail('${id}')">← 返回</button>
        <h2>新增照護紀錄</h2>
        <p class="subtitle">${escapeHTML(p.name)}「${escapeHTML(p.nickname || '未命名')}」</p>
        <div class="card">
          <label>照護類型</label>
          <select id="log-type"><option>澆水</option><option>施肥</option><option>修剪</option><option>換盆</option><option>除蟲</option><option>觀察</option></select>
          <label>日期</label>
          <input id="log-date" type="date" value="${todayISO()}" />
          <label>備註</label>
          <textarea id="log-note" placeholder="例如：土壤變乾，澆到盆底出水"></textarea>
          <button class="full" onclick="saveLog('${id}')">儲存紀錄</button>
        </div>`;
    }

    function saveLog(id) {
      const type = document.getElementById('log-type').value;
      const date = document.getElementById('log-date').value || todayISO();
      const note = document.getElementById('log-note').value.trim();
      appData.careLogs.push({ id: uid('log'), plantId: id, type, date, note, createdAt: new Date().toISOString() });
      if (type === '澆水') {
        const p = appData.plants.find(x => x.id === id);
        if (p) { p.lastWateredAt = date; p.updatedAt = new Date().toISOString(); }
      }
      saveData();
      renderAll();
      showToast('照護紀錄已儲存。');
      openDetail(id);
    }

    function quickObserve(id) {
      if (alreadyObservedToday(id)) {
        showToast('今天已經完成這盆植物的觀察。');
        return;
      }
      const p = appData.plants.find(x => x.id === id);
      appData.careLogs.push({ id: uid('log'), plantId: id, type: '觀察', date: todayISO(), note: '今日任務：完成植物觀察。', createdAt: new Date().toISOString() });
      if (p) p.updatedAt = new Date().toISOString();
      saveData();
      renderAll();
      if (selectedPlantId === id) renderDetail(id);
      showToast('完成觀察，獲得 5 XP。');
    }

    function quickWater(id) {
      appData.careLogs.push({ id: uid('log'), plantId: id, type: '澆水', date: todayISO(), note: '快速記錄澆水。', createdAt: new Date().toISOString() });
      const p = appData.plants.find(x => x.id === id);
      if (p) { p.lastWateredAt = todayISO(); p.updatedAt = new Date().toISOString(); }
      saveData();
      renderAll();
      if (selectedPlantId === id) renderDetail(id);
      showToast('已記錄澆水，獲得 10 XP。提醒日期已更新。');
    }

    function deletePlant(id) {
      if (!confirm('確定要刪除此植物嗎？相關照護紀錄也會刪除。')) return;
      appData.plants = appData.plants.filter(p => p.id !== id);
      appData.careLogs = appData.careLogs.filter(l => l.plantId !== id);
      saveData();
      selectedPlantId = null;
      renderAll();
      showToast('植物已刪除。');
      setScreen('plants');
    }

          <h3>搜尋與篩選</h3>
          <input id="knowledge-search" placeholder="搜尋植物，例如：蘭、蕨、多肉、香草" value="${escapeHTML(knowledgeSearch)}" oninput="setKnowledgeSearch(this.value)" />
          <div class="category-row" style="margin-top:10px;">
            ${plantCategories.concat(easeCategories.filter(c => !plantCategories.includes(c))).map(c => `<button type="button" class="small ${selectedKnowledgeCategory === c ? '' : 'light'}" onclick="setKnowledgeCategory('${c}')">${c}</button>`).join('')}
          </div>
          <p id="knowledge-result-count" class="result-count"></p>
          <div id="knowledge-list"></div>
        </div>`;
      renderKnowledgeList();
    }

    function setKnowledgeCategory(category) {
      selectedKnowledgeCategory = category;
      renderKnowledge();
    }

    function setKnowledgeSearch(value) {
      knowledgeSearch = value;
      renderKnowledgeList();
    }

    function renderKnowledgeList() {
      const listEl = document.getElementById('knowledge-list');
      const countEl = document.getElementById('knowledge-result-count');
      if (!listEl || !countEl) return;
      const list = filterPlantDatabase(selectedKnowledgeCategory, knowledgeSearch);
      countEl.textContent = `找到 ${list.length} 種植物`;
      listEl.innerHTML = list.length ? list.map(p => `<div class="knowledge-item" onclick='openKnowledge(${JSON.stringify(p.name)})'><div><strong>${p.name}</strong><p class="hint">${escapeHTML(getPlantCategory(p))}｜${escapeHTML(getEaseLevel(p))}｜約 ${p.interval} 天檢查澆水</p></div><span>›</span></div>`).join('') : `<div class="empty"><h3>找不到植物</h3><p>可以換分類，或搜尋「蘭」「竹芋」「仙人掌」「香草」。</p></div>`;
    }

    function openKnowledge(name) {
      selectedKnowledge = name;
      renderKnowledgeDetail(name);
      setScreen('knowledge-detail');
    }

    function renderKnowledgeDetail(name) {
      const p = getPlantInfo(name);
      document.getElementById('screen-knowledge-detail').innerHTML = `
        <button class="light small" onclick="setScreen('knowledge')">← 返回知識庫</button>
        <div class="card">
          <h2>${escapeHTML(p.name)}</h2>
          <p class="subtitle">容易度：${escapeHTML(getEaseLevel(p))}｜原始難度：${escapeHTML(p.difficulty)}</p><span class="ease-pill">${escapeHTML(getEaseAdvice(p))}</span>
          <div class="divider"></div>
          <h3>照護重點</h3>
          <p>${escapeHTML(p.note)}</p>
          <div class="divider"></div>
          <h3>基本需求</h3>
          <p>☀️ 光照：${escapeHTML(p.light)}</p>
          <p>💧 澆水：${escapeHTML(p.watering)}</p>
          <p>🪴 建議：大約 ${p.interval} 天檢查一次土壤，不要照天數盲目澆水。</p>
          <button class="full" onclick="setScreen('add')">加入我的植物</button>
        </div>`;
    }

    function renderSettings() {
      const g = gameStats();
      document.getElementById('screen-settings').innerHTML = `
        <h2>設定</h2>
        <div class="card game-card">
          <h3>達人養成進度</h3>
          <p>綠手指等級：Lv.${g.level}｜${g.title.title}</p>
          <div class="xp-bar"><div class="xp-fill" style="--xp:${g.currentXp}%"></div></div>
          <p class="hint">總經驗值：${g.xp} XP｜連續照護：${g.streak} 天</p>
          <div class="badge-grid">${g.badges.map(b => `<span class="badge-pill ${b.unlocked ? '' : 'locked'}">${b.icon} ${b.name}</span>`).join('')}</div>
          <button class="full secondary" onclick="setScreen('academy')">查看植物達人養成</button>
        </div>
        <div class="card">
          <h3>資料備份</h3>
          <p>目前資料儲存在這台裝置的瀏覽器中。若更換手機或清除瀏覽器資料，資料可能會消失。</p>
          <div class="divider"></div>
          <p>植物：${appData.plants.length} 盆</p>
          <p>照護紀錄：${appData.careLogs.length} 筆</p>
          <div class="actions">
            <button onclick="exportData()">匯出我的植物資料</button>
            <button class="secondary" onclick="document.getElementById('import-file').click()">匯入備份檔</button>
          </div>
        </div>
        <div class="soft-card">
          <h3>儲存方式說明</h3>
          <p>第一版不需要登入。資料會自動保存在這台裝置。建議定期匯出備份。</p>
        </div>
        <div class="card">
          <h3>加入手機主畫面</h3>
          <p>如果之後把這個檔案部署成網站，就可以像 App 一樣加入手機主畫面。</p>
          <ol class="install-steps">
            <li>用 Safari 或 Chrome 打開網站。</li>
            <li>點分享按鈕。</li>
            <li>選擇「加入主畫面」。</li>
            <li>桌面會出現「植物綠手指」。</li>
          </ol>
          <button class="full secondary" onclick="resetOnboarding()">重新觀看新手教學</button>
        </div>
        <div class="card">
          <h3 class="danger-text">危險操作</h3>
          <p>清除後無法復原。請先匯出備份。</p>
          <button class="full danger" onclick="clearAllData()">清除全部資料</button>
        </div>`;
    }

    function exportData() {
      const payload = { ...appData, exportedAt: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `plant-green-thumb-backup-${todayISO()}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('備份檔已匯出。');
    }

    document.getElementById('import-file').addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      if (!confirm('匯入備份會覆蓋目前資料，確定要繼續嗎？')) { event.target.value = ''; return; }
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        if (!Array.isArray(imported.plants) || !Array.isArray(imported.careLogs)) throw new Error('格式錯誤');
        appData = { ...blankData(), ...imported };
        saveData();
        renderAll();
        setScreen('today');
        showToast('備份已匯入。');
      } catch (error) {
        showToast('匯入失敗：檔案格式不正確。');
      } finally {
        event.target.value = '';
      }
    });

    function clearAllData() {
      if (!confirm('確定要清除全部資料嗎？這個動作無法復原。')) return;
      appData = blankData();
      saveData();
      selectedPlantId = null;
      renderAll();
      setScreen('today');
      showToast('全部資料已清除。');
    }

    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.nav;
        setScreen(target);
      });
    });

    appData.version = '1.4.0';
    saveData();
    renderAll();
  </script>
</body>
</html>
