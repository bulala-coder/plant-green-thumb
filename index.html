<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3f7d58" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="植物綠手指" />
  <meta name="description" content="植物收藏管理、環境參數追蹤與進階照護決策 Web App。" />
  <link rel="manifest" href="./plant-green-thumb-manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./plant-green-thumb-icon-192.png" />
  <link rel="apple-touch-icon" href="./plant-green-thumb-icon-192.png" />
  <title>植物綠手指</title>
  <link rel="stylesheet" href="./styles.css?v=2.1.3" />
</head>
<body>
  <main class="app">
    <header>
      <div class="brand">
        <div class="logo">🌱</div>
        <div>
          <h1>植物綠手指</h1>
          <p class="subtitle">植物玩家的收藏管理與照護決策系統</p>
        </div>
      </div>
    </header>

    <section id="screen-today" class="screen active"></section>
    <section id="screen-plants" class="screen"></section>
    <section id="screen-add" class="screen"></section>
    <section id="screen-detail" class="screen"></section>
    <section id="screen-log" class="screen"></section>
    <section id="screen-diagnosis" class="screen"></section>
    <section id="screen-diagnosis-result" class="screen"></section>
    <section id="screen-knowledge" class="screen"></section>
    <section id="screen-knowledge-detail" class="screen"></section>
    <section id="screen-academy" class="screen"></section>
    <section id="screen-analysis" class="screen"></section>
    <section id="screen-settings" class="screen"></section>
  </main>

  <nav class="nav">
    <button data-nav="today" class="active"><span class="icon">☀️</span>總覽</button>
    <button data-nav="plants"><span class="icon">🪴</span>收藏</button>
    <button data-nav="diagnosis"><span class="icon">🩺</span>診斷</button>
    <button data-nav="knowledge"><span class="icon">📚</span>知識</button>
    <button data-nav="analysis"><span class="icon">📊</span>分析</button>
    <button data-nav="settings"><span class="icon">⚙️</span>設定</button>
  </nav>

  <div id="toast" class="toast"></div>
  <input id="import-file" type="file" accept="application/json,.json" class="hidden" />
  <div id="onboarding" class="onboarding-overlay"></div>

  <script src="./data/plants.js?v=2.1.3"></script>
  <script src="./data/symptoms.js?v=2.1.3"></script>
  <script src="./data/knowledgeCards.js?v=2.1.3"></script>
  <script src="./data/quizzes.js?v=2.1.3"></script>
  <script src="./app.js?v=2.1.3"></script>
</body>
</html>
